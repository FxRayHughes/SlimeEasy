# ============================================================
#  SlimeEasy 配置文件
# ============================================================
# 说明:
#  - 时间单位以各字段注释为准: 秒为墙钟时间, tick 为 Slimefun/Bukkit 调度单位。
#  - enabled:        功能开关。false = 不注册该内容 (需重启生效)。
#  - research-level: 研究解锁所需经验等级 (需重启生效)。
#  - 其余数值:       运行时读取, /se reload 后立即生效。
#
#  重载: 游戏内执行 /se reload。
#   · 运行时数值 (伤害/范围/冷却/间隔/产量/吞吐/上限) —— 立即生效。
#   · 功能开关 / 研究等级 / 物品文本 (items 段) —— 需重启服务端。
#
#  玩家可见文本位于 lang/<language>.yml，颜色码使用 &。
# ============================================================

# 语言文件名，对应 plugins/SlimeEasy/lang/<language>.yml。
language: zh_CN

# ---------- 机器通用 (破坏机 / 放置机的展示框调频) ----------
machine:
  frequency:
    # 展示框调频的默认间隔 (Slimefun tick 数)。
    default-interval: 1
    # 拉杆每旋转一档改变的 tick 步进。
    step-per-angle: 3

# ---------- 自动破坏机 ----------
auto-breaker:
  enabled: true
  research-level: 10

# ---------- 自动放置机 ----------
auto-placer:
  enabled: true
  research-level: 10

# ---------- 筛子 ----------
sieve:
  enabled: true
  research-level: 8
  reinforced-research-level: 16
  processing:
    minimum-action-interval-ticks: -1
    action-multiplier: 1.5
    scaffolding-speed-multiplier: 1.5
    max-linked-sieves: 100
    required-actions:
      dirt: 4
      grass-block: 6
      gravel: 8
      dust: 8
      crushed-netherrack: 12
      soul-sand: 7
      soul-soil: 11
      sand: 6
      crushed-end-stone: 20
      crushed-blackstone: 16

  # 强化筛子使用下方 chances 的完整基准收益；普通筛子降低常规概率与部分保底数量。
  rewards:
    basic:
      chance-multiplier: 0.5
      guaranteed-amount-multiplier: 0.5
      # 竹子是普通筛子的专属进阶材料：可直接种植，也可用于制作强化结构所需的脚手架。
      chance-overrides:
        dirt:
          bamboo: 8
        grass-block:
          bamboo: 16

  # 筛面原料使用 BlockDisplay 展示。长宽从 0.8 缩至 0.64，高度从 0.8 压至 0。
  # Display 的底面中心固定在活板门筛面中心，动画由客户端插值完成，不使用逐 tick 实体移动。
  animation:
    enabled: true
    interpolation-ticks: 3
    completion-ticks: 5
    start-horizontal-scale: 0.8
    end-horizontal-scale: 0.64
    start-height-scale: 0.8

  # 强化筛子的基准概率；普通筛子按 rewards.basic.chance-multiplier 衰减。
  # 每个条目独立判定，取值范围 0-100；修改后执行 /se reload 即时生效。
  chances:
    dirt:
      # 小麦种子
      wheat-seeds: 7
      # 矮草（草籽）
      short-grass: 7
      # 西瓜种子
      melon-seeds: 3
      # 南瓜种子
      pumpkin-seeds: 3
      # 甘蔗
      sugar-cane: 3
      # 胡萝卜
      carrot: 2
      # 马铃薯
      potato: 2
      # 橡树树苗（橡子）
      oak-sapling: 2
      # 金合欢树苗
      acacia-sapling: 1
      # 云杉树苗
      spruce-sapling: 1
      # 白桦树苗
      birch-sapling: 1
      # 竹子；普通筛子使用 rewards.basic.chance-overrides 中的更高概率。
      bamboo: 2
    grass-block:
      wheat-seeds: 14
      short-grass: 14
      melon-seeds: 6
      pumpkin-seeds: 6
      sugar-cane: 6
      carrot: 4
      potato: 4
      oak-sapling: 4
      acacia-sapling: 2
      spruce-sapling: 2
      birch-sapling: 2
      bamboo: 4
    gravel:
      # 燧石
      flint: 25
      # 煤炭
      coal: 13
      # 青金石
      lapis-lazuli: 5
      # 钻石
      diamond: 1
      # 绿宝石
      emerald: 1
      # 铁原矿
      raw-iron: 20
      # 金原矿
      raw-gold: 3
      # 铜原矿
      raw-copper: 6
      # Slimefun 锡粉
      tin-dust: 6
      # Slimefun 铝粉
      aluminum-dust: 13
    dust:
      # 骨粉
      bone-meal: 20
      # 红石
      redstone: 13
      # 火药
      gunpowder: 7
      # 萤石粉
      glowstone-dust: 6
      # 烈焰粉
      blaze-powder: 5
      # Slimefun 铁粉
      iron-dust: 20
      # Slimefun 金粉
      gold-dust: 3
      # Slimefun 铜粉
      copper-dust: 6
      # Slimefun 锡粉
      tin-dust: 7
      # Slimefun 铝粉
      aluminum-dust: 13
    crushed-netherrack:
      # 铁原矿
      raw-iron: 17
      # 金原矿
      raw-gold: 17
      # 铜原矿
      raw-copper: 10
    soul-sand:
      # 地狱疣
      nether-wart: 5
      # 恶魂之泪
      ghast-tear: 2
      # 额外的下界石英（保底 1 个不受此项影响）
      extra-quartz: 33
    soul-soil:
      # 地狱疣
      nether-wart: 5
      # 恶魂之泪
      ghast-tear: 2
      # 额外的下界石英（保底 1 个不受此项影响）
      extra-quartz: 33
    sand:
      # 可可豆
      cocoa-beans: 3
      # 仙人掌（仙人掌种子）
      cactus: 3
      # 丛林树苗
      jungle-sapling: 2
      # 棕色蘑菇（古代孢子）
      brown-mushroom: 1
      # 铁原矿
      raw-iron: 20
      # 金原矿
      raw-gold: 3
      # 铜原矿
      raw-copper: 6
      # Slimefun 锡粉
      tin-dust: 6
      # Slimefun 铝粉
      aluminum-dust: 13
    crushed-end-stone:
      # Slimefun 锡粉
      tin-dust: 10
      # 末影珍珠
      ender-pearl: 5
      # 紫颂果
      chorus-fruit: 8
      # 爆裂紫颂果
      popped-chorus-fruit: 4
      # 潜影壳
      shulker-shell: 1
    crushed-blackstone:
      # 玄武岩
      basalt: 20
      # 下界石英
      quartz: 15
      # 金粒
      gold-nugget: 12
      # 岩浆膏
      magma-cream: 5
      # 萤石粉
      glowstone-dust: 6
      # 烈焰粉
      blaze-powder: 4
      # 哭泣的黑曜石
      crying-obsidian: 2
      # 远古残骸
      ancient-debris: 1

# ---------- 苦力怕驱逐方块 ----------
creeper-ward:
  enabled: true
  research-level: 10
  # 保护半径 (区块): 1 = 以所在区块为中心的 3x3 区块。
  protect-radius-chunks: 1
  # 主动推离苦力怕的检测半径 (格)。
  detect-radius: 48.0
  # 推离水平力度。
  push-strength: 0.8
  # 推离附加的向上分量。
  push-up: 0.2
  # 单次 tick 最多推离的苦力怕数量。
  max-push-attempts: 20
  # 保护区缓存 TTL (秒)。
  protection-ttl-seconds: 8
  # 单次自然生成事件最多回溯扫描的区块数。
  max-scan-chunks: 16

# ---------- 屠夫机器 ----------
butcher:
  enabled: true
  research-level: 15
  # 基础攻击截面边长 (格); 每级范围升级 +2。
  base-span: 3
  # 基础攻击纵深 (格); 每级范围升级 +1。
  base-depth: 1
  # 每级伤害升级的线性加成 (基础值的比例)。
  damage-per-level: 0.5
  # 每 1 点饱食度折算的攻击次数。
  attacks-per-nutrition: 15
  # 内部余量缓存上限 (饱食度)。
  max-satiety: 100
  # 范围 / 伤害升级级数上限。
  max-upgrade-level: 5

# ---------- 自动点击器 ----------
auto-clicker:
  enabled: true
  research-level: 15
  # 最小点击间隔 (tick); 0.05 = 每 tick 连点 20 次。
  min-interval: 0.05
  # 最大点击间隔 (tick)。
  max-interval: 40.0
  # 默认点击间隔 (tick)。
  default-interval: 4.0
  # 微调步进 (Shift 点击, tick)。
  fine-step: 0.05
  # 粗调步进 (普通点击, tick)。
  coarse-step: 0.25
  # 单个 Slimefun tick 内的最多点击次数 (防卡)。
  max-clicks-per-tick: 20
  # 安装抽取升级后, 单个 tick 最多补入物品槽的数量。
  extract-max-items-per-tick: 64

# ---------- 采石场 (观察者方块; 附着圆石 + 岩浆 + 水 -> 产出配置材料) ----------
quarry:
  enabled: true
  research-level: 12
  # 无效率升级时, 每隔多少个 Slimefun tick 生产一次。
  base-interval-ticks: 2
  # 无效率升级时每次生产数量。
  base-output: 1
  # 五档效率升级每个 Slimefun tick 的生产数量。
  efficiency-output:
    tier-1: 1
    tier-2: 6
    tier-3: 12
    tier-4: 32
    tier-5: 64
  # 周围容器放不下时是否把剩余产物掉落在采石场位置; false = 直接丢弃。
  drop-overflow: false

# ---------- 矿物勘察尺 ----------
survey-ruler:
  enabled: true
  research-level: 10
  # 勘察冷却 (tick)。
  cooldown-ticks: 100
  # 普通工业矿机采掘半径 (7x7 -> 3)。
  miner-range: 3
  # 进阶工业矿机采掘半径 (11x11 -> 5)。
  advanced-miner-range: 5
  # 燃料估算: 每单位燃料可驱动的挖掘方块数。
  blocks-per-bucket: 96
  blocks-per-raw-fuel: 128
  blocks-per-fuel: 256

# ---------- 工程师护目镜 ----------
engineer-goggles:
  enabled: true
  research-level: 12
  # 同世界三维直线扫描半径；扫描不会主动加载区块。
  radius: 16
  # 穿戴检测、机器信息与全息图刷新周期 (tick)。
  refresh-ticks: 10
  # 每轮最多首次扫描的 16×16×16 空间单元；调低可减轻尖峰，但新区域结构会更慢出现。
  max-new-cells-per-refresh: 4

# ---------- 生长抑制器 ----------
growth-inhibitor:
  enabled: true
  research-level: 10

# ---------- 战斗挽具 ----------
combat-harness:
  enabled: true
  research-level: 20
  # 四档挽具每次激光的魔法伤害 (点)。
  damage:
    tier-1: 5.0
    tier-2: 10.0
    tier-3: 20.0
    tier-4: 25.0
  # 交战半径 (格)。
  range: 16.0
  # 两次开火最小间隔 (毫秒)。
  cooldown-millis: 1500
  # 扫描周期 (tick)。
  period-ticks: 15

# ---------- 存储系统 ----------
storage:
  # 海量抽屉
  drawer:
    enabled: true
    research-level: 8
    # 磁吸半径 (格)。
    magnet-radius: 6.0
    # 存储的物品种类槽位数。
    slots: 32
  # 翻页存储箱
  box:
    enabled: true
    research-level: 15
    # 每页物品种类数。
    page-types: 45
    # 磁吸半径 (格)。
    magnet-radius: 6.0
  # 磁盘管理器与物品存储磁盘
  disk:
    enabled: true
    research-level: 25
  # 存储升级组件
  upgrade:
    enabled: true
    research-level: 20
    # 升级槽位上限。
    max-slots: 14
    # 翻页升级的最大页数。
    max-pages: 5
    # 抽取 / 输出过滤名单最大物品种类数 (界面上限 27)。
    filter-max-items: 27
    # 新过滤器是否默认使用白名单模式; false = 默认黑名单。
    filter-default-whitelist: false
  # 抽取 / 输出升级及每个主动网络端口的单 tick 搬运吞吐。0 = 不限制。
  io:
    pull-max-items-per-tick: 0
    push-max-items-per-tick: 0
  # 存储网络
  network:
    enabled: true
    research-level: 30
    # 网络扫描半径 (格)。
    scan-radius: 24
    # 单个远程终端最多绑定的控制器数量。0 = 不限制。
    remote-terminal-max-bindings: 0

# ---------- 简易村民 ----------
villager:
  # 村民捕捉器
  catcher:
    enabled: true
    research-level: 12
  # 僵尸信号
  zombie-signal:
    enabled: true
    research-level: 8
  # 村民交易器
  trader:
    enabled: true
    research-level: 18
    # 补货间隔 (秒): 村民职业与工作站方块匹配时, 每隔该秒数重置交易次数。
    restock-interval-seconds: 30
  # 胶囊刷铁机
  iron-farm:
    enabled: true
    research-level: 20
    # 产铁间隔 (秒): 村民 + 僵尸信号 + 食物齐全时的产出周期。
    produce-interval-seconds: 20
    # 每次产铁消耗的食物饱食度。
    food-per-cycle: 1
    # 每次产出的铁锭数量。
    iron-per-cycle: 1
    # 速度升级级数上限。
    speed-upgrade-max-level: 5
    # 速度升级每级缩短系数: 实际间隔 = 产铁间隔 / (1 + 级数 x 步长)。
    speed-upgrade-step: 0.5
  # 村民小学
  school:
    enabled: true
    research-level: 15
    # 傻子村民转化为无职业普通村民所需秒数。
    convert-seconds: 30
  # 遗忘药剂
  forgetting-potion:
    enabled: true
    research-level: 12
  # 村民治愈机
  healer:
    enabled: true
    research-level: 15
    # 僵尸村民治愈为普通村民所需秒数 (每次消耗一个普通金苹果)。
    convert-seconds: 30

# ---------- 简易的领地 ----------
territory:
  # 功能开关与研究等级在 Slimefun 注册阶段冻结，修改后需重启。
  enabled: true
  research-level: 8
