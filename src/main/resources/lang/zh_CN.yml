        &7速率: {rate}
        &7产物: &f{output}

        &7脸朝向的 &f圆石 &7需同时相邻 &c岩浆 &7与 &9水&7,
        &7满足即持续产出圆石 (不破坏该圆石)。
        &7产物输出到本机周围的 &f容器 / 抽屉 / 翻页箱&7。
    info-template:
      name: "&b采石场"
      lore: |-
        &7脸朝向 &f圆石&7, 且该圆石同时相邻 &c岩浆 &7与 &9水 &7时产出圆石。
        &7安装产物升级后可改为产出 &c地狱岩 &7或 &e末地石&7。
        &7产物输出到周围的 &f容器 / 抽屉 / 翻页箱&7。
