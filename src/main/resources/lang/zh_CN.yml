      disabled:
        name: "&7{face} 面: 禁用"
        lore: |-
          &8点击启用
    mode:
      blacklist:
        name: "&c黑名单模式"
        lore: |-
          &7名单内的物品 &c不处理&7, 其余放行
          &8点击切换为白名单
      whitelist:
        name: "&a白名单模式"
        lore: |-
          &7仅处理名单内的物品, 其余拦截
          &8点击切换为黑名单
  common:
    upgrade-placeholder:
