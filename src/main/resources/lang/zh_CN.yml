      lore: |-
        &7核心与全部旗帜区块必须保持相连
    expansion-mode:
      name: "&a选择此领地进行扩区"
      lore: |-
        &760 秒内放置的下一面领地旗帜
        &7将明确归属到当前领地
    disband-confirm:
      name: "&c确认永久解散"
      lore: |-
        &7释放全部区块并清除成员权限
