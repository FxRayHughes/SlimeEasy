        &7手持或点击背包内的升级组件安装
    void-config:
      name: "&8虚空过滤配置"
      lore: |-
        &7点击管理销毁列表
    extract-config:
      name: "&e抽取过滤配置"
      lore: |-
        &7点击管理抽取黑 / 白名单
    output-config:
      name: "&e输出过滤配置"
      lore: |-
        &7点击管理输出黑 / 白名单
    compression-config:
      name: "&6压制配置"
      lore: |-
        &7点击管理 17 格黑 / 白名单
        &7并设置是否允许不可逆配方
    previous-page:
      name: "&e上一页"
      lore: []
    next-page:
      name: "&e下一页"
      lore: []
    upgrade-entry:
      name: "&b升级插件"
      lore: |-
        &7点击管理升级组件
  upgrades:
    extract-title: "&8抽取配置"
    output-title: "&8输出配置"
  compression:
    title: "&8压制配置"
    marker:
      name: "&e标记物品"
      lore: |-
        &7手持物品点击, 或点击背包物品
        &7加入 / 移出压制名单
    irreversible:
      enabled:
