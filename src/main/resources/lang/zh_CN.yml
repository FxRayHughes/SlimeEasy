# SlimeEasy 简体中文语言文件。
# 颜色码使用 &；动态内容使用 {placeholder}。
# 物品与 UI 使用层级 name/lore，lore 采用 YAML 多行块。

items:
  auto-breaker:
    name: "&e自动破坏机"
    lore: |-

      &7在相邻放置 &f普通活塞&7, 机器会自动破坏
      &7活塞推杆朝向的方块并收入本箱子。

      &7在活塞上放置带拉杆的展示框,
      &7可通过旋转拉杆调节破坏频率。

      &7将工具放入箱内 &f任意位置 &7即用该工具
      &7挖掘 (享受时运/精准采集), 耐久耗尽后
      &7自动改用其余工具或恢复默认挖掘。
  auto-placer:
    name: "&a自动放置机"
    lore: |-

      &7在相邻放置 &f粘性活塞&7, 机器会把箱内
      &7方块自动放置到活塞推杆朝向的空位。

      &7在活塞上放置带拉杆的展示框,
      &7可通过旋转拉杆调节放置频率。

      &7从箱内 &f第一个可放置方块 &7开始取用,
      &7目标非空位或无方块时自动跳过。
  sieve:
    name: "&6筛子"
    lore: |-

      &7像磨石一样搭建: 将橡木活板门
      &7放在一个朝上的发射器上方。

      &7右键活板门可即时筛选发射器内的一份材料。
      &7每项产物概率均独立计算, 可同时产出多种物品。
  sieve-materials:
    dust:
      name: "&f尘土"
      lore: |-
        &7用磨石粉碎沙子获得, 可放入筛子筛选。
    crushed-netherrack:
      name: "&c粉碎地狱岩"
      lore: |-
        &7用磨石粉碎地狱岩获得, 可放入筛子筛选。
    crushed-end-stone:
      name: "&e粉碎末地石"
      lore: |-
        &7用磨石粉碎末地石获得, 可放入筛子筛选。
    crushed-blackstone:
      name: "&8粉碎黑石"
      lore: |-
        &7用磨石粉碎磨制黑石获得, 可放入筛子筛选。
        &8普通黑石仍按 Slimefun 原配方磨成沙砾。
  creeper-ward:
    name: "&a苦力怕驱逐方块"
    lore: |-

      &7放置后, 其所在区块及周围一圈
      &7共 &f3x3 个区块 &7内不再自然生成苦力怕,
      &7已进入范围的苦力怕会被持续推出,
      &7且在范围内 &c无法爆炸&7。

      &7保护随方块存在而持续, 破坏后失效。
  survey-ruler:
    name: "&b矿物勘察尺"
    lore: |-

      &7右键地面, 按 &f工业矿机 &7的采掘范围
      &7(&f7×7&7) 向下勘探, 列出可开采的
      &7矿石种类与数量。

      &7潜行 + 左键: 切换展示形式 (&f聊天栏 &7/ &f箱子界面&7)

      &7冷却: &f5 秒
  advanced-survey-ruler:
    name: "&b进阶矿物勘察尺"
    lore: |-

      &7右键地面, 按 &f当前勘察范围 &7向下勘探,
      &7列出可开采的矿石种类与数量。

      &7潜行 + 右键空气: 在 &f进阶工业矿机 &7(&f11×11&7)
      &7与 &f工业矿机 &7(&f7×7&7) 两种范围间切换。

      &7潜行 + 左键: 切换展示形式 (&f聊天栏 &7/ &f箱子界面&7)

      &7冷却: &f5 秒
  engineer-goggles:
    name: "&b工程师护目镜"
    lore: |-

      &7戴在头盔栏后，显示附近 &fSlimefun 方块
      &7与多方块结构的名称和可读取的能源数据。

      &7显示半径: &f{radius} 格
      &8全息图仅自己可见，且不会阻挡点击。

      &7主手持有时潜行 + 左键: &f打开显示筛选
      &7潜行 + 右键机器: &f切换该物品类型显示
      &7筛选界面可切换: &f附近显示 / 瞄准显示
  engineer-night-vision-goggles:
    name: "&a工程师夜视护目镜"
    lore: |-

      &7结合 &f夜视眼镜 &7与 &f工程师护目镜，
      &7佩戴后持续获得夜视并显示附近机器诊断信息。

      &7显示半径: &f{radius} 格
      &8私有全息图不会阻挡点击，也不会被其他玩家看到。

      &7主手持有时潜行 + 左键: &f打开显示筛选
      &7潜行 + 右键机器: &f切换该物品类型显示
      &7筛选界面可切换: &f附近显示 / 瞄准显示
  butcher:
    name: "&c屠夫机器"
    lore: |-

      &7自动攻击 &f脸朝向前方 3×3 &7区域内的
      &7非玩家生物 (范围横扫)。

      &7右键打开界面:
      &7· &f7 把武器&7: 第一把优先, 耐久耗尽自动切下一把
      &7· &f附魔书&7: 抢夺 / 锋利 / 火焰附加等生效
      &7· &f食物&7: 折算为攻击次数 (每 1 饱食 15 次, 内部缓存上限 100 饱食)
      &7· &f升级槽&7: 范围 / 伤害组件 (数量即级数, 最多 5)

      &7所有物品可用 &f物流网络 &7或 &f漏斗 &7自动输入
      &7(漏斗任意面对准机器即可)。
      &7击杀正常掉落物品与经验; 在他人领地内失效。
  butcher-range-upgrade:
    name: "&d屠夫 · 范围升级"
    lore: |-

      &7放入屠夫机器的范围升级槽。
      &7每一个: 攻击截面 &f+2 格&7、纵深 &f+1 格&7。
      &7(3×3 → 5×5 → 7×7 …, 按数量叠加)
  butcher-damage-upgrade:
    name: "&c屠夫 · 伤害升级"
    lore: |-

      &7放入屠夫机器的伤害升级槽。
      &7每一个: 攻击伤害 &f+50% 基础值&7。
      &7(×1.5 → ×2.0 → ×2.5 …, 按数量叠加)
  auto-clicker:
    name: "&6自动点击器"
    lore: |-

      &7以假玩家身份, 不断 &f左键 / 右键 &7脸朝向正前方的方块。

      &c需红石激活&7: 通电时工作, 断电即停。
      &7右键打开界面放入 &f一格物品&7: 点击时假玩家
      &7手持该物品交互 (如骨粉施肥 / 桶取放液体), 消耗后回写。
      &7物品可用 &f相邻漏斗 &7(输出对准本机) 或物流网络补充;
      &7界面内可装 &f抽取升级&7: 改为从相邻箱子 / 容器补料并支持黑 / 白名单。

      &7支持点击 &fSlimefun (粘液) 方块&7, 且 &f绕过其研究解锁限制&7。
      &8约每秒点击一次。
  growth-inhibitor:
    name: "&a生长抑制器"
    lore: |-

      &7右键一只 &f幼年生物&7: 锁定其年龄,
      &7使其 &f永远保持幼小&7、不再长大。

      &7再次右键 &f已锁定 &7的生物: 解除锁定, 恢复生长。
      &8(仅对动物 / 村民等可繁殖生物有效)
  combat-harness:
    tier-1:
      name: "&b战斗挽具 I"
      lore: |-

        &7给 &f快乐恶魂 (乐魂) &7右键佩戴。
        &7佩戴后乐魂以 &b守护者激光 &7主动攻击
        &7周围 &f视线内 &7的敌对生物 (&c不穿透方块&7)。

        &7每次激光造成 &c{damage} 点 &7伤害 (&d药水/魔法伤害, 无视护甲&7)。
    tier-2:
      name: "&a战斗挽具 II"
      lore: |-

        &7给 &f快乐恶魂 (乐魂) &7右键佩戴。
        &7佩戴后乐魂以 &b守护者激光 &7主动攻击
        &7周围 &f视线内 &7的敌对生物 (&c不穿透方块&7)。

        &7每次激光造成 &c{damage} 点 &7伤害 (&d药水/魔法伤害, 无视护甲&7)。
    tier-3:
      name: "&6战斗挽具 III"
      lore: |-

        &7给 &f快乐恶魂 (乐魂) &7右键佩戴。
        &7佩戴后乐魂以 &b守护者激光 &7主动攻击
        &7周围 &f视线内 &7的敌对生物 (&c不穿透方块&7)。

        &7每次激光造成 &c{damage} 点 &7伤害 (&d药水/魔法伤害, 无视护甲&7)。
    tier-4:
      name: "&c战斗挽具 IV"
      lore: |-

        &7给 &f快乐恶魂 (乐魂) &7右键佩戴。
        &7佩戴后乐魂以 &b守护者激光 &7主动攻击
        &7周围 &f视线内 &7的敌对生物 (&c不穿透方块&7)。

        &7每次激光造成 &c{damage} 点 &7伤害 (&d药水/魔法伤害, 无视护甲&7)。
  quarry:
    name: "&b采石场"
    lore: |-

      &7观察者方块。&f脸朝向 &7的圆石若同时相邻
      &c岩浆 &7与 &9水 &7(不必是源头), 便持续产出圆石
      &7(不破坏该圆石)。

      &7本身 &f无容积&7, 产物直接输出到周围的
      &f容器 / 抽屉 / 翻页箱&7。

      &7右键打开界面放入 &f效率升级 I~V &7提速:
      &7空槽使用基础速率; I~V 逐档提速,
      &7实际间隔与产量以服务器配置为准。
      &7另可安装 &c地狱岩升级 &7或 &e末地石升级 &7改变产物。
  quarry-efficiency:
    tier-1:
      name: "&f采石场效率升级 I"
      lore: |-

        &7放入采石场的 &f效率升级槽&7。
        &7生产速率由档位与服务器配置决定。
        &8(仅认物品身份, 堆叠数量无关)
    tier-2:
      name: "&a采石场效率升级 II"
      lore: |-

        &7放入采石场的 &f效率升级槽&7。
        &7生产速率由档位与服务器配置决定。
        &8(仅认物品身份, 堆叠数量无关)
    tier-3:
      name: "&e采石场效率升级 III"
      lore: |-

        &7放入采石场的 &f效率升级槽&7。
        &7生产速率由档位与服务器配置决定。
        &8(仅认物品身份, 堆叠数量无关)
    tier-4:
      name: "&b采石场效率升级 IV"
      lore: |-

        &7放入采石场的 &f效率升级槽&7。
        &7生产速率由档位与服务器配置决定。
        &8(仅认物品身份, 堆叠数量无关)
    tier-5:
      name: "&6采石场效率升级 V"
      lore: |-

        &7放入采石场的 &f效率升级槽&7。
        &7生产速率由档位与服务器配置决定。
        &8(仅认物品身份, 堆叠数量无关)
  quarry-output:
    netherrack:
      name: "&c采石场地狱岩升级"
      lore: |-

        &7放入采石场的 &f产物升级槽&7。
        &7使采石场把产物从圆石改为 &c地狱岩&7。
        &8圆石、岩浆与水的生产结构保持不变。
    end-stone:
      name: "&e采石场末地石升级"
      lore: |-

        &7放入采石场的 &f产物升级槽&7。
        &7使采石场把产物从圆石改为 &e末地石&7。
        &8圆石、岩浆与水的生产结构保持不变。
    blackstone:
      name: "&8采石场黑石升级"
      lore: |-

        &7放入采石场的 &f产物升级槽&7。
        &7使采石场把产物从圆石改为 &8黑石&7。
        &8成本更高, 但生产结构保持不变。
  storage:
    drawer:
      name: "&e海量抽屉"
      lore: |-

        &7存储 &f单一种类 &7物品, 数量远超原版堆叠。
        &7放置后朝向你的一面会显示物品; &f准星对准 &7查看数量。

        &7展示框右键: 存入手中该组; &f双击 &7存入背包全部同类;
        &7展示框左键: 取出一个; &fShift+左键 &7取出一组;
        &f右键木桶本体 &7打开操作界面 (含升级入口)。

        &7可接入原版货运网络。
    paged-box:
      name: "&6翻页存储箱"
      lore: |-

        &7存储 &f多种 &7物品 (每种一格, 每页容量由配置决定),
        &7每格数量远超原版堆叠。

        &7右键打开分页界面: 点击箱内物品取出,
        &7点击背包物品存入; 界面内可打开升级 GUI。

        &7可接入原版货运网络。
    disk-manager:
      name: "&d磁盘管理器"
      lore: |-

        &7利用雕纹书架的六个书槽安装物品存储磁盘，
        &7磁盘会直接显示在方块外观上。

        &7右键打开独立界面，查看状态并安装 / 拆卸磁盘。
        &7相邻接入存储网络后，可从聚合终端存取磁盘内容。
    disks:
      1k:
        name: "&f1K 物品存储磁盘"
        lore: |-
          &7容量: &f1,024 字节
          &7物品种类上限: &f64
      4k:
        name: "&a4K 物品存储磁盘"
        lore: |-
          &7容量: &f4,096 字节
          &7物品种类上限: &f64
      16k:
        name: "&b16K 物品存储磁盘"
        lore: |-
          &7容量: &f16,384 字节
          &7物品种类上限: &f64
      64k:
        name: "&d64K 物品存储磁盘"
        lore: |-
          &7容量: &f65,536 字节
          &7物品种类上限: &f64
      128k:
        name: "&6128K 物品存储磁盘"
        lore: |-
          &7容量: &f131,072 字节
          &7物品种类上限: &f64
      256k:
        name: "&c256K 物品存储磁盘"
        lore: |-
          &7容量: &f262,144 字节
          &7物品种类上限: &f64
      status-lore: |-
        &7物品种类: &f{types}&7/{maxTypes}
        &7物品总数: &f{items}
        &7字节占用: &f{used}&7/{capacity}

        &8非空磁盘不能存入其它磁盘
    network:
      controller:
        name: "&b网络控制器"
        lore: |-

          &7存储网络的大脑与访问入口。
          &7右键打开 &f聚合终端&7: 一处存取全网所有
          &7抽屉 / 存储箱的库存。

          &7每 tick 驱动网络内的输入 / 输出端口路由,
          &7桥接原版货运。覆盖半径由服务器配置决定。
      connector:
        name: "&7网络连接器"
        lore: |-

          &7网络导线: 连接控制器与各存储方块 / 端口。
          &7相邻放置即导通, 无需朝向。
      input-port:
        name: "&a网络输入端口"
        lore: |-

          &7货运塞入的物品会被 &f分发进网络&7,
          &7按优先级填入各成员容器。

          &7需连入含控制器的网络方可工作。
      output-port:
        name: "&c网络输出端口"
        lore: |-

          &7从网络取出物品供货运抽走。

          &7需连入含控制器的网络方可工作。
    remote-terminal:
      name: "&d远程终端"
      lore: |-

        &7手持右键 &f网络控制器 &7追加绑定;
        &7手持右键可远程打开当前网络终端,
        &7点击 &f下一页左侧按钮 &7切换其它终端,
        &7Shift + 右键 &f管理所有绑定。
        &7随时随地存取全网库存。

        &7绑定信息存于物品自身。
    upgrades:
      stack-1:
        name: "&f堆叠升级 I"
        lore: |-

          &7单格容量 &f×4

          &8[存储升级组件]
      stack-2:
        name: "&e堆叠升级 II"
        lore: |-

          &7单格容量 &f×16

          &8[存储升级组件]
      stack-3:
        name: "&6堆叠升级 III"
        lore: |-

          &7单格容量 &f×64

          &8[存储升级组件]
      experience:
        name: "&a经验存储升级"
        lore: |-

          &7装入抽屉后改为 &f存储经验&7 (拒绝物品货运)。

          &8[存储升级组件]
      magnet:
        name: "&b磁铁升级"
        lore: |-

          &7每 tick 吸附配置半径内的掉落物 / 经验球。

          &8[存储升级组件]
      void:
        name: "&8虚空升级"
        lore: |-

          &7命中销毁列表的物品在容器内 &f封顶到保留数量&7,
          &7超出部分入库前 &c湮灭&7 (保留 0 即全毁);
          &7在升级 GUI 中配置列表与保留数量。

          &8[存储升级组件]
      page:
        name: "&d翻页扩容"
        lore: |-

          &7为&f翻页存储箱&7增加 &f1 页 &7容量;
          &7可叠装, 最大页数由服务器配置决定。
          &8(对抽屉无效)

          &8[存储升级组件]
      wise:
        name: "&a智者升级"
        lore: |-

          &7经验容器 &f吸入经验 &7时,
          &7有 &f20% &7几率使该次经验翻倍。
          &8(需与经验+磁铁升级同装)

          &8[存储升级组件]
      ender-wise:
        name: "&5末影智者升级"
        lore: |-

          &7经验容器 &f吸入经验 &7时,
          &7有 &f50% &7几率使该次经验翻倍。
          &7可与智者升级叠加 (独立触发)。
          &8(需与经验+磁铁升级同装)

          &8[存储升级组件]
      extract:
        name: "&e抽取升级"
        lore: |-

          &7装入容器 / 自动点击器后, 每 tick 从相邻六向的
          &7漏斗 / 箱子 / 本插件存储容器主动提取物品。
          &7可在升级 GUI 内配置黑 / 白名单与 &f生效面&7, 精确控制抽取。
          &8(经验模式下不生效)

          &8[存储升级组件]
      remote:
        name: "&d远程升级"
        lore: |-

          &7手持右键网络控制器 &f选定目标&7,
          &7再把本升级装入抽屉 / 箱子升级槽,
          &7使其 &f远程接入 &7该控制器网络
          &7(无视物理相邻范围)。

          &8[存储升级组件]
      output:
        name: "&e物品输出升级"
        lore: |-

          &7装入容器后, 每 tick 把库存物品主动推送到相邻
          &7六向的容器 (箱子 / 漏斗 / 输出箱 / 本插件存储容器)。
          &7可在升级 GUI 内配置黑 / 白名单与 &f生效面&7, 精确控制输出。
          &8(经验模式下不生效)

          &8[存储升级组件]
      compression:
        name: "&6压制升级"
        lore: |-

          &7仅适用于 &f翻页存储箱&7。
          &7在物品数量发生变化时, 按 &f2×2 &7压缩配方
          &7将其压制为对应变体。
          &7拥有 &f17 格 &7黑 / 白名单过滤槽。

          &8[存储升级组件]
      advanced-compression:
        name: "&c高级压制升级"
        lore: |-

          &7仅适用于 &f翻页存储箱&7。
          &7支持 &f2×2 与 3×3 &7压缩配方,
          &7拥有 &f17 格 &7黑 / 白名单过滤槽。
          &7可选择是否处理不可逆配方。

          &8[存储升级组件]
  villager:
    zombie-signal:
      name: "&2僵尸信号"
      lore: |-

        &7以腐肉与铁锭合成的僵尸气息信号。
        &7胶囊刷铁机的必备催化剂 (装入即可, 不消耗)。
    catcher:
      name: "&a村民捕捉器"
      lore: |-

        &7右键活体村民: &f收入此瓶 &7(保留其全部属性)。
        &7潜行 + 右键: &f放出 &7瓶中村民。

        &7空瓶亦可作交易器 / 刷铁机的合成材料。
    trader:
      name: "&b村民交易器"
      lore: |-

        &7透明容器, 内嵌一只小村民展示。

        &7空块右键: 放入 &f村民 (满捕捉器) &7或 &f工作站方块&7;
        &7已装村民时右键: &f直接打开交易界面&7;
        &7潜行 + 右键: &f取出 &7村民或工作站方块。

        &7装配的村民与工作站方块匹配时, 按配置间隔 &f自动补货&7,
        &7补货不受时间 / 范围等外部因素影响。
        &7玩家与其交易, 而无需操心保护村民。
    iron-farm:
      name: "&f胶囊刷铁机"
      lore: |-

        &7透明容器, 内嵌村民与僵尸展示; 产铁瞬间闪现铁傀儡。

        &7右键打开界面, 放入:
        &7· &f村民 (满捕捉器)&7 · &f僵尸信号&7 · &f食物&7 · &f速度升级&7;
        &7三者齐全 (村民 + 僵尸信号 + 食物) 时按周期产出铁锭,
        &7每周期消耗少量食物; 速度升级可缩短周期。
    iron-farm-speed-upgrade:
      name: "&e刷铁机 · 速度升级"
      lore: |-

        &7放入胶囊刷铁机的速度升级槽。
        &7堆叠数量 = 级数; 级数越高产铁周期越短。
    school:
      name: "&6村民小学"
      lore: |-

        &7右键打开界面, 放入 &f傻子村民 (满捕捉器)&7,
        &7按配置时间后自动转化为 &f无职业普通村民&7 (可再就业),
        &7转化结果落入输出槽。
    healer:
      name: "&6村民治愈机"
      lore: |-

        &7右键打开界面, 放入 &f僵尸村民 (满捕捉器)&7 与 &f普通金苹果&7,
        &7按配置时间后把僵尸村民 &f治愈为普通村民&7 (保留职业),
        &7每次消耗一个普通金苹果; 结果落入输出槽。
    forgetting-potion:
      name: "&d遗忘药剂"
      lore: |-

        &7右键一只活体村民: 使其 &f忘却职业&7,
        &7变回无职业普通村民 (可重新就业)。
        &7每次消耗一瓶。
    filled-catcher:
      name: "村民捕捉器 · {villager}"
      profession-lore: "&7职业: &f{profession}"
      trade-lore: "&7等级: &f{level}  &7交易: &f{trades} 项"
      release-lore: "&7潜行 + 右键放出该村民"
  territory-core:
    name: "&6领地核心"
    lore: |-

      &7放下后以所在区块为中心认领 3×3 区域
      &7每名玩家只能拥有一个领地
      &7右键打开领地管理界面
  territory-flag:
    name: "&f领地旗帜"
    lore: |-

      &7以旗帜所在区块为中心声明 3×3 区块
      &7同一领地的旗帜覆盖可以重叠
      &7手持时显示附近已声明区域边界
      &7最多放置 35 面旗帜
groups:
  utility-machines:
    name: "&b实用机械"
    lore: |-

      &7各类自动化实用装置
  utility-tools:
    name: "&b实用工具"
    lore: |-

      &7各类手持辅助工具
  storage:
    name: "&b存储系统"
    lore: |-

      &7海量存储抽屉、翻页箱、磁盘与存储网络
  villager:
    name: "&b简易村民"
    lore: |-

      &7与村民打交道而无需操心保护村民
  territory:
    name: "&6简易的领地"
    lore: |-

      &7按区块认领、成员授权与 Slimefun 保护兼容
