          &7间隔 <1 tick 时单 tick 内连点多次
          &7范围 {min}~{max}
      increase:
        name: "&a+ 增大间隔"
        lore: |-
          &7点击 +{coarseStep} tick
          &7Shift 点击 +{fineStep} tick
    toggle:
      enabled:
        name: "&a{mode}: 开启"
        lore: |-
          &7点击关闭
      disabled:
        name: "&7{mode}: 关闭"
        lore: |-
          &7点击开启
  quarry:
    labels:
      efficiency-upgrade:
        name: "&e效率升级 →"
        lore: |-
          &7放入 &f采石场效率升级 I~V&7:
          &7各档实际产量以服务器配置为准,
          &7当前速率显示于上方状态面板。
      output-upgrade:
        name: "&6产物升级 →"
        lore: |-
          &7放入 &c地狱岩升级 &7或 &e末地石升级&7。
          &7空槽时默认产出 &f圆石&7。
    rate:
