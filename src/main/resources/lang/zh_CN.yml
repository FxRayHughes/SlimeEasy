          &7放入至多 7 把武器
          &7第一把优先, 耐久耗尽自动切下一把
      enchantment-book:
        name: "&d附魔书 →"
        lore: |-
          &7放入附魔书
          &7抢夺 / 锋利 / 火焰附加生效
      food:
        name: "&6食物 →"
        lore: |-
          &7放入食物
          &7每 1 饱食度 = 15 次攻击
          &7内部缓存上限 100 饱食度
      range-upgrade:
        name: "&b范围升级 →"
        lore: |-
          &7堆叠数量 = 级数 (最多 5)
