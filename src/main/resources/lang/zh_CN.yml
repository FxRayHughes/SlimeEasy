  butcher:
    labels:
      weapon:
        name: "&e武器区 (下方一行)"
        lore: |-
          &7放入至多 7 把武器
          &7第一把优先, 耐久耗尽自动切下一把
      enchantment-book:
        name: "&d附魔书 →"
        lore: |-
          &7放入附魔书
          &7抢夺 / 锋利 / 火焰附加生效
      food:
        name: "&6食物 →"
        lore: |-
          &7放入食物
          &7每 1 饱食度 = 15 次攻击
          &7内部缓存上限 100 饱食度
      range-upgrade:
        name: "&b范围升级 →"
        lore: |-
          &7堆叠数量 = 级数 (最多 5)
          &7每级攻击截面 +2、纵深 +1
      damage-upgrade:
        name: "&c伤害升级 →"
        lore: |-
          &7堆叠数量 = 级数 (最多 5)
          &7每级伤害 +50% 基础值
    info-template:
      name: "&c屠夫机器"
      lore: |-
        &7自动攻击脸朝向前方区域内的非玩家生物。

        &7右键放入: 武器 / 附魔书 / 食物 / 升级组件。
        &7食物也可用漏斗或物流网络自动输入。
    info:
      name: "&c屠夫机器"
      lore: |-
        &7当前武器: &f{weapon}
        &7内部余量: &f{satiety}&7/&f{maxSatiety} &7饱食度 (&f{attacks} &7次)
        &7攻击范围: &f{span}×{span} &7(范围升级 &f{rangeLevel}&7)
        &7伤害倍率: &f×{damageMultiplier} &7(伤害升级 &f{damageLevel}&7)

        &7武器区 (下方一行) 放至多 7 把武器
        &7附魔书: 抢夺/锋利/火焰附加生效
        &7食物: 每 1 饱食度 = 15 次攻击
        &7升级槽: 范围 / 伤害组件 (最多 5 级)
        &7所有物品均可用漏斗 (任意面对准) 或物流输入
  auto-clicker:
